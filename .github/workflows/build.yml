name: Build PGPatcher

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Install flatc
        uses: Nugine/setup-flatc@v1
        with:
          version: "25.2.10"

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Build Artifact
        run: |
          ./buildRelease.ps1 -NoZip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pgpatcher-windows-${{ github.sha }}
          path: dist/PGPatcher

  build-linux:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Configure
        run: cmake -S . -B buildLinux -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build
        run: cmake --build buildLinux --config RelWithDebInfo

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pgpatcher-linux-${{ github.sha }}
          path: buildLinux/bin
